<script>
/**
 * DashboardProc.html
 * Dashboard khusus Procurement - V2.4 (Accordion Filter & UI Fixes)
 */

var App = App || {};

App.proc = {
  state: {
    page: 1,
    limit: 50,
    status: 'all',
    rounding: false,
    supplier: '',
    procId: '',
    productName: '',
    edRange: 'all'
  },

  template: `
    <div class="fade-in">
      <div class="card-header-actions" style="margin-bottom: 20px;">
        <h2 style="color: var(--primary-color); margin: 0;">Dashboard Procurement</h2>
      </div>

      <!-- FILTER PANEL (ACCORDION) -->
      <div class="card" style="position: sticky; top: 60px; z-index: 99; border-left: 5px solid var(--primary-color);">
        <details>
          <summary style="cursor: pointer; font-weight: bold; color: var(--primary-color); padding: 5px 0; list-style: none; display: flex; align-items: center; justify-content: space-between;">
            <span>🔍 Klik untuk Filter Data</span>
            <span style="font-size: 0.8em; color: #666;">▼</span>
          </summary>
          
          <div style="margin-top: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; align-items: end; border-top: 1px solid #eee; padding-top: 15px;">
            
            <div class="form-group" style="margin:0;">
              <label>Nama Produk</label>
              <input type="text" id="filter-product-name" placeholder="Cari produk..." 
                     oninput="App.proc.updateFilter('productName', this.value)" style="padding: 8px;">
            </div>

            <div class="form-group" style="margin:0;">
              <label>Supplier</label>
              <select id="filter-supplier" onchange="App.proc.updateFilter('supplier', this.value)">
                <option value="">Semua Supplier</option>
              </select>
            </div>

            <div class="form-group" style="margin:0;">
              <label>Procurement ID</label>
              <select id="filter-proc-id" onchange="App.proc.updateFilter('procId', this.value)">
                <option value="">Semua ID</option>
              </select>
            </div>

            <div class="form-group" style="margin:0;">
              <label>Status Aksi</label>
              <select id="filter-status" onchange="App.proc.updateFilter('status', this.value)">
                <option value="all">Semua</option>
                <option value="belum">Belum Ditangani</option>
                <option value="sudah">Sudah Ditangani</option>
              </select>
            </div>

            <div class="form-group" style="margin:0;">
              <label>ED Range</label>
              <select id="filter-ed" onchange="App.proc.updateFilter('edRange', this.value)">
                <option value="all">Jan - Sept 2026</option>
                <option value="bulan_ini">Bulan Ini (Jan)</option>
                <option value="1_3_bulan">1-3 Bulan (Feb-Apr)</option>
                <option value="4_6_bulan">4-6 Bulan (Mei-Jul)</option>
                <option value="7_12_bulan">7-12 Bulan (Agust-Sept)</option>
              </select>
            </div>

            <div class="form-group" style="margin:0;">
              <label>Rounding</label>
              <div style="display: flex; align-items: center; height: 38px;">
                <input type="checkbox" id="filter-rounding" onchange="App.proc.updateFilter('rounding', this.checked)" style="width: auto; margin-right: 8px;">
                <span>Bulatkan ke Bawah</span>
              </div>
            </div>

            <div class="form-group" style="margin:0;">
              <button class="btn-primary" onclick="App.proc.fetchData()">Terapkan Filter</button>
            </div>
          </div>
        </details>
      </div>

      <!-- SUMMARY TILES -->
      <div id="proc-summary" class="kpi-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px;">
        <!-- Diisi via JS -->
      </div>

      <!-- CHARTS -->
      <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
        <div class="card">
          <h4>Analisis Penyebaran Risiko (Top 10 Produk)</h4>
          <div id="chart-risk-dist" style="width: 100%; height: 300px;"></div>
        </div>
        <div class="card">
          <h4>Visualisasi Risiko Produk ED Berdasarkan Total Biaya</h4>
          <div id="chart-time-risk" style="width: 100%; height: 300px;"></div>
        </div>
      </div>

      <!-- ACTION TABLE -->
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h4>Detail Stok Nasional</h4>
          <div>
            <button class="btn-secondary" style="font-size: 0.8em; padding: 6px 12px;" onclick="App.proc.exportCsv()">Ekspor CSV</button>
          </div>
        </div>
        
        <div style="overflow-x: auto;">
          <table class="monitoring-table" style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="background: #f8f9fa; text-align: left;">
                <th style="padding: 12px;">Supplier / Produk</th>
                <th style="padding: 12px;">Qty</th>
                <th style="padding: 12px;">Detail</th>
                <th style="padding: 12px;">Total Cost</th>
                <th style="padding: 12px;">Status</th>
                <th style="padding: 12px;">Aksi</th>
              </tr>
            </thead>
            <tbody id="proc-table-body">
              <tr><td colspan="6" class="text-center">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px;">
          <button class="btn-secondary" style="width: auto;" onclick="App.proc.changePage(-1)" id="btn-prev">Previous</button>
          <span id="page-info">Halaman 1</span>
          <button class="btn-secondary" style="width: auto;" onclick="App.proc.changePage(1)" id="btn-next">Next</button>
        </div>
      </div>
      
      <div style="margin-top: 20px; text-align: center;">
        <button class="btn-secondary" style="width: auto;" onclick="location.reload()">Keluar</button>
      </div>
    </div>
  `,

  init: function() {
    document.getElementById('main-content').innerHTML = this.template;
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(() => { this.fetchData(); });
  },

  updateFilter: function(key, value) {
    this.state[key] = value;
    if (key !== 'page') this.state.page = 1;
  },

  fetchData: function() {
    App.showNotification("Memuat data procurement...", "loading");
    
    google.script.run
      .withSuccessHandler(res => {
        App.hideNotification();
        if (res.error) { App.showNotification(res.error, "error"); return; }
        this.render(res);
      })
      .withFailureHandler(err => {
        App.hideNotification();
        App.showNotification("Gagal: " + err.message, "error");
      })
      .getProcDashboardData(this.state);
  },

  changePage: function(delta) {
    this.state.page += delta;
    this.fetchData();
  },

  render: function(data) {
    // 1. Render Summary
    const summaryContainer = document.getElementById('proc-summary');
    const fmt = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
    const fmtNum = (num) => new Intl.NumberFormat('id-ID').format(num);
    
    let summaryHtml = '';
    let grandTotal = 0;
    
    data.summary.forEach(s => {
      grandTotal += s.val;
      const colorClass = s.label === 'Belum Ditangani' ? 'urgent-high' : 'urgent-low';
      summaryHtml += `
        <div class="kpi-card monitoring-card ${colorClass}">
          <p class="kpi-title">${s.label}</p>
          <h3 class="kpi-value">${fmt(s.val)}</h3>
          <small>${s.sku} SKU</small>
        </div>
      `;
    });
    
    summaryHtml = `
      <div class="kpi-card monitoring-card" style="border-left: 5px solid #007bff;">
        <p class="kpi-title">Total Nasional</p>
        <h3 class="kpi-value">${fmt(grandTotal)}</h3>
        <small>Estimasi Risiko</small>
      </div>
    ` + summaryHtml;

    summaryContainer.innerHTML = summaryHtml;

    // 2. Populate Dropdowns
    this.populateDropdown('filter-supplier', data.filters.suppliers, this.state.supplier);
    this.populateDropdown('filter-proc-id', data.filters.procIds, this.state.procId);

    // 3. Render Charts
    this.drawRiskDistributionChart(data.charts.riskDistribution);
    this.drawTimeRiskChart(data.charts.timeRisk);

    // 4. Render Table
    const tbody = document.getElementById('proc-table-body');
    if (data.data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center">Tidak ada data sesuai filter.</td></tr>';
    } else {
      let rows = '';
      data.data.forEach(item => {
        const detail = item.detailInfo;
        const ed = new Date(detail.nearestED).toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });
        const statusBadge = item.status === 'Belum Ditangani' 
          ? '<span class="status-badge" style="background: #dc3545;">Belum</span>'
          : '<span class="status-badge" style="background: #28a745;">Sudah</span>';

        rows += `
          <tr>
            <td style="padding: 12px; border-bottom: 1px solid #eee;">
              <b>${item.supplier}</b><br>
              <span style="font-size:0.9em;">${item.productName}</span><br>
              <small style="color:#666;">${item.productCode}</small>
            </td>
            <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">
              ${fmtNum(item.totalQty)}
            </td>
            <td style="padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85em;">
              <b>Kategori:</b> ${detail.category}<br>
              <b>ED Terdekat:</b> ${ed}<br>
              <b>Jml Batch:</b> ${detail.batchCount}<br>
              <b>Jml Apotek:</b> ${detail.pharmacyCount}<br>
              <b>Cost/Unit:</b> ${fmt(detail.costPerUnit)}
            </td>
            <td style="padding: 12px; border-bottom: 1px solid #eee;">${fmt(item.totalCost)}</td>
            <td style="padding: 12px; border-bottom: 1px solid #eee;">${statusBadge}</td>
            <td style="padding: 12px; border-bottom: 1px solid #eee;">
              <button class="btn-secondary" style="padding: 4px 8px; font-size: 0.8em;" onclick="alert('Fitur Update Aksi akan hadir di Phase 3')">Update</button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = rows;
    }

    // 5. Update Pagination
    document.getElementById('page-info').textContent = `Halaman ${data.pagination.currentPage} dari ${data.pagination.totalPages}`;
    document.getElementById('btn-prev').disabled = data.pagination.currentPage === 1;
    document.getElementById('btn-next').disabled = data.pagination.currentPage === data.pagination.totalPages;
  },

  populateDropdown: function(id, items, selectedValue) {
    const select = document.getElementById(id);
    const defaultOption = select.options[0];
    select.innerHTML = '';
    select.appendChild(defaultOption);

    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item;
      opt.textContent = item;
      if (item === selectedValue) opt.selected = true;
      select.appendChild(opt);
    });
  },

  drawRiskDistributionChart: function(products) {
    const chartData = [['Produk', 'Total Biaya (Rp)', 'Jumlah Apotek']];
    products.forEach(p => {
      chartData.push([p.name, p.cost, p.outlets]);
    });

    const data = google.visualization.arrayToDataTable(chartData);
    const options = {
      title: '',
      vAxes: {
        0: {title: 'Total Biaya (Rp)', format: 'short'},
        1: {title: 'Jumlah Apotek', format: 'decimal'}
      },
      hAxis: {title: 'Produk', slantedText: true, slantedTextAngle: 30},
      seriesType: 'bars',
      series: {
        0: {targetAxisIndex: 0, color: '#007bff'},
        1: {type: 'line', targetAxisIndex: 1, color: '#dc3545'}
      },
      chartArea: {width: '80%', height: '60%'},
      legend: {position: 'bottom'}
    };

    const chart = new google.visualization.ComboChart(document.getElementById('chart-risk-dist'));
    chart.draw(data, options);
  },

  drawTimeRiskChart: function(timeData) {
    const chartData = [['Kategori ED', 'Total Biaya (Rp)', { role: 'style' }]];
    const colors = {'Bulan Ini': '#dc3545', '1-3 Bulan': '#fd7e14', '4-6 Bulan': '#ffc107', '7-12 Bulan': '#28a745'};
    
    timeData.forEach(t => {
      chartData.push([t.category, t.value, colors[t.category] || '#007bff']);
    });

    const data = google.visualization.arrayToDataTable(chartData);
    const options = {
      title: '',
      legend: { position: "none" },
      chartArea: {width: '80%', height: '70%'},
      hAxis: { title: 'Sisa Waktu ED' },
      vAxis: { title: 'Total Biaya (Rp)', format: 'short' }
    };

    const chart = new google.visualization.ColumnChart(document.getElementById('chart-time-risk'));
    chart.draw(data, options);
  },

  exportCsv: function() {
    alert("Fitur Ekspor CSV akan diaktifkan setelah data stabil.");
  }
};
</script>
